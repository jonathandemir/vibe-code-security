name: VibeGuard Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  scan:
    name: VibeGuard Agent
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required for the bot to post PR comments
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run VibeGuard Analysis
        uses: ./action  # We point to our local action folder for testing
        with:
          api_key: "VIBEGUARD_LOCAL_DEV_KEY"  # Required for API authentication
          api_url: "https://vibeguard-api.onrender.com/scan-repo"  # Render Production Server
          language: "javascript"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}