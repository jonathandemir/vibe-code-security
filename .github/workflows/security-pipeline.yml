name: VibeGuard Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  scan:
    name: VibeGuard Agent
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required for the bot to post PR comments
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run VibeGuard Analysis
        uses: ./action # Uses the local action in this repository
        with:
          api-url: 'https://vibe-code-security-api.onrender.com' # Your live Render backend
          language: 'python'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}