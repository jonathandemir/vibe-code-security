name: 'VibeGuard Security Scan'
description: 'Automated application security scanning for Vibe-Coders.'
author: 'VibeGuard'
branding:
  icon: 'shield'
  color: 'purple'

inputs:
  api_url:
    description: 'The URL of your VibeGuard API instance'
    required: false
    default: 'https://vibeguard-api.onrender.com/scan-repo'
  api-url:
    description: 'Alias for api_url (deprecated, use api_url)'
    required: false
    default: 'https://vibeguard-api.onrender.com/scan-repo'
  language:
    description: 'The primary language of the codebase to scan (e.g., python, javascript, typescript, go)'
    required: false
    default: 'javascript'

runs:
  using: 'composite'
  steps:
    - name: Run VibeGuard Scanner Script
      run: ${{ github.action_path }}/entrypoint.sh
      shell: bash
      env:
        API_URL: ${{ inputs.api_url }}
        LANGUAGE: ${{ inputs.language }}
        GITHUB_TOKEN: ${{ github.token }}
